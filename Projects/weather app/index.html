<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skycast — Weather App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-gradient" id="bgGradient"></div>

  <div class="container">

    <header class="app-header">
      <h1 class="app-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
        </svg>
        Skycast
      </h1>
    </header>

    <!-- Search -->
    <div class="search-wrapper">
      <div class="search-bar glass">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" placeholder="Search for a city…" autocomplete="off" spellcheck="false" />
        <button id="searchBtn" type="button" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>
      <div class="recent-searches" id="recentSearches"></div>
    </div>

    <!-- Error -->
    <div class="error-message hidden" id="error">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span id="errorText"></span>
    </div>

    <!-- Loading -->
    <div class="loading hidden" id="loading">
      <div class="spinner"></div>
      <span>Fetching weather…</span>
    </div>

    <!-- Current Weather Card -->
    <div class="weather-card glass hidden" id="weatherCard">
      <div class="weather-main">
        <div class="weather-left">
          <div class="city-name" id="city"></div>
          <div class="weather-date" id="weatherDate"></div>
          <div class="temperature" id="temp"></div>
          <div class="description" id="desc"></div>
        </div>
        <div class="weather-right">
          <img class="weather-icon-main" id="weatherIcon" src="" alt="weather icon" />
        </div>
      </div>

      <div class="weather-details">
        <div class="detail-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2v10M12 22a5 5 0 0 0 5-5c0-3-5-11-5-11S7 14 7 17a5 5 0 0 0 5 5z"/>
          </svg>
          <span class="detail-label">Humidity</span>
          <span class="detail-value" id="humidity"></span>
        </div>
        <div class="detail-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/>
            <path d="M9.6 4.6A2 2 0 1 1 11 8H2"/>
            <path d="M12.6 19.4A2 2 0 1 0 14 16H2"/>
          </svg>
          <span class="detail-label">Wind</span>
          <span class="detail-value" id="wind"></span>
        </div>
        <div class="detail-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
          </svg>
          <span class="detail-label">Feels Like</span>
          <span class="detail-value" id="feelsLike"></span>
        </div>
        <div class="detail-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <span class="detail-label">Visibility</span>
          <span class="detail-value" id="visibility"></span>
        </div>
      </div>
    </div>

    <!-- 5-Day Forecast -->
    <div class="forecast-card glass hidden" id="forecastCard">
      <h3 class="forecast-title">5-Day Forecast</h3>
      <div class="forecast-strip" id="forecastStrip"></div>
    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
